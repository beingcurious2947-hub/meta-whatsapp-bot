<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bella Napoli — Chat with Us</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf6ef;
  --dark:#1a1208;
  --rust:#b94c2e;
  --rust-light:#d4644a;
  --rust-pale:#f5e8e4;
  --muted:#7a6e62;
  --border:rgba(26,18,8,0.12);
}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--cream);color:var(--dark)}
body{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:1rem;
  background-image:
    radial-gradient(ellipse 60% 50% at 20% 80%,rgba(185,76,46,0.07) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 20%,rgba(185,76,46,0.05) 0%,transparent 70%);
}
.page{width:100%;max-width:460px;animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* Brand */
.brand{text-align:center;padding:2rem 1rem 1.4rem}
.brand-logo{
  width:54px;height:54px;border-radius:50%;
  background:var(--rust);display:inline-flex;
  align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:24px;color:#fff;
  margin-bottom:10px;box-shadow:0 4px 18px rgba(185,76,46,0.35)
}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;letter-spacing:0.02em}
.brand-tag{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:3px}

/* Card */
.card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(26,18,8,0.13);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}

/* Status bar */
.status-bar{background:var(--dark);padding:10px 18px;display:flex;align-items:center;gap:8px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#5cb85c;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:0.04em}

/* Messages */
.msgs{height:360px;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:11px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:4px}
.row{display:flex;gap:8px;max-width:88%}
.row.u{align-self:flex-end;flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;background:var(--rust);font-family:'Cormorant Garamond',serif;font-size:14px;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.row.u .av{background:#ede9e3;color:var(--muted);font-family:'Outfit',sans-serif;font-size:11px}
.bub{background:#f4f0eb;border-radius:16px 16px 16px 4px;padding:11px 15px;font-size:13.5px;line-height:1.6;color:var(--dark);white-space:pre-wrap}
.row.u .bub{background:var(--rust);color:#fff;border-radius:16px 16px 4px 16px}
.typing span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.3s infinite;margin-right:3px}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s;margin-right:0}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* Chips */
.chips{padding:10px 14px;display:flex;flex-wrap:wrap;gap:7px;border-top:1px solid var(--border);background:#fdfbf8}
.chip{font-size:12px;font-family:'Outfit',sans-serif;padding:6px 13px;border:1px solid rgba(185,76,46,0.28);border-radius:20px;cursor:pointer;color:var(--rust);background:transparent;transition:all .15s}
.chip:hover{background:var(--rust-pale);border-color:var(--rust)}

/* Input */
.inp-row{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);background:#fff;align-items:center}
.inp{flex:1;border:1px solid var(--border);border-radius:24px;padding:10px 16px;font-size:13.5px;font-family:'Outfit',sans-serif;background:var(--cream);color:var(--dark);outline:none;transition:border .2s}
.inp:focus{border-color:var(--rust)}
.inp::placeholder{color:var(--muted)}
.send{width:38px;height:38px;border-radius:50%;background:var(--rust);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s}
.send:hover{background:var(--rust-light)}
.send:active{transform:scale(.93)}
.send svg{width:15px;height:15px;fill:#fff}

/* Setup overlay */
.setup{position:absolute;inset:0;background:rgba(255,255,255,0.97);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:14px;z-index:10;text-align:center}
.setup h2{font-family:'Cormorant Garamond',serif;font-size:24px}
.setup p{font-size:13px;color:var(--muted);line-height:1.6;max-width:280px}
.setup a{color:var(--rust)}
.setup-inp{width:100%;max-width:300px;border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:13px;font-family:'Outfit',sans-serif;color:var(--dark);background:var(--cream);outline:none;transition:border .2s}
.setup-inp:focus{border-color:var(--rust)}
.setup-btn{width:100%;max-width:300px;padding:13px;background:var(--rust);color:#fff;border:none;border-radius:10px;font-size:14px;font-family:'Outfit',sans-serif;font-weight:500;cursor:pointer;transition:background .15s}
.setup-btn:hover{background:var(--rust-light)}
.setup-err{font-size:12px;color:#c0392b;display:none}
.card-wrap{position:relative}
.footer{text-align:center;padding:1rem 0 .5rem;font-size:11px;color:var(--muted)}
.footer a{color:var(--rust);text-decoration:none}
</style>
</head>
<body>
<div class="page">
  <div class="brand">
    <div class="brand-logo">B</div>
    <div class="brand-name">Bella Napoli</div>
    <div class="brand-tag">Authentic Neapolitan Italian · Mumbai</div>
  </div>

  <div class="card-wrap">
    <div class="setup" id="setup">
      <div class="brand-logo">B</div>
      <h2>Chat with Us</h2>
      <p>Enter your <a href="https://console.groq.com" target="_blank">Groq API key</a> to activate the assistant. Free to get — takes 2 minutes.</p>
      <input class="setup-inp" id="keyInp" type="password" placeholder="Paste your key here (gsk_...)"/>
      <div class="setup-err" id="keyErr">Please enter a valid Groq key starting with gsk_</div>
      <button class="setup-btn" onclick="activateKey()">Start Chatting →</button>
    </div>

    <div class="card">
      <div class="status-bar">
        <div class="status-dot"></div>
        <span class="status-text">Bella Napoli Assistant — Online Now</span>
      </div>
      <div class="msgs" id="msgs"></div>
      <div class="chips">
        <button class="chip" onclick="quick(this)">What are your hours?</button>
        <button class="chip" onclick="quick(this)">Show me the menu</button>
        <button class="chip" onclick="quick(this)">Book a table</button>
        <button class="chip" onclick="quick(this)">Where are you located?</button>
        <button class="chip" onclick="quick(this)">Vegetarian options?</button>
        <button class="chip" onclick="quick(this)">Do you deliver?</button>
      </div>
      <div class="inp-row">
        <input class="inp" id="inp" placeholder="Ask anything about Bella Napoli…" onkeydown="if(event.key==='Enter')send()"/>
        <button class="send" onclick="send()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="footer">Powered by AI · <a href="#">bellanapolirestaurant.com</a></div>
</div>

<script>
const SYSTEM = `You are a warm and friendly AI assistant for Bella Napoli, an authentic Neapolitan Italian restaurant in Mumbai.

STRICT RULE: ONLY answer questions about Bella Napoli. If anyone asks anything unrelated, respond ONLY with:
"I can only help with Bella Napoli questions! Ask me about our menu, hours, reservations, or location 🍕"

RESTAURANT DETAILS:
Name: Bella Napoli
Address: 42 Harbour Street, Mumbai, Maharashtra
Phone: +91 98765 43210

OPENING HOURS:
Monday - Thursday: 12:00 PM to 10:00 PM
Friday - Saturday: 12:00 PM to 11:00 PM
Sunday: 1:00 PM to 9:00 PM

MENU:
Starters: Bruschetta ₹320 | Burrata ₹480 | Calamari ₹420 | Antipasto ₹560
Pizzas: Margherita ₹550 | Diavola ₹650 | Truffle Funghi ₹780 | Quattro Formaggi ₹680 | Prosciutto ₹720
Pasta: Carbonara ₹620 | Arrabbiata ₹480 | Tagliatelle Ragu ₹680 | Cacio e Pepe ₹540
Desserts: Tiramisu ₹320 | Panna Cotta ₹280 | Cannoli ₹260
Drinks: Italian Sodas ₹180 | House Wine ₹380/glass | Espresso ₹120 | Aperol Spritz ₹420

POLICIES:
- Reservations: Call or WhatsApp +91 98765 43210
- Delivery: Swiggy and Zomato
- Parking: Free behind the restaurant
- Vegetarian: Many options available
- Gluten-free pasta: On request
- Private dining: Groups of 10+

Keep replies short (2-4 sentences). Use ₹ for prices. Be warm and welcoming.`;

let history = [];
let apiKey  = '';

function activateKey() {
  const v = document.getElementById('keyInp').value.trim();
  if (!v.startsWith('gsk_')) { document.getElementById('keyErr').style.display='block'; return; }
  apiKey = v;
  document.getElementById('setup').style.display = 'none';
  addMsg('bot', 'Ciao! 👋 Welcome to Bella Napoli. I can help you with our menu, hours, reservations, and more. What can I do for you today?');
}

function addMsg(role, text) {
  const msgs = document.getElementById('msgs');
  const row  = document.createElement('div');
  row.className = 'row' + (role==='user' ? ' u' : '');
  const av  = document.createElement('div'); av.className='av'; av.textContent = role==='user'?'You':'B';
  const bub = document.createElement('div'); bub.className='bub'; bub.textContent = text;
  row.appendChild(av); row.appendChild(bub);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('msgs');
  const row  = document.createElement('div'); row.className='row'; row.id='typing';
  const av   = document.createElement('div'); av.className='av'; av.textContent='B';
  const bub  = document.createElement('div'); bub.className='bub typing'; bub.innerHTML='<span></span><span></span><span></span>';
  row.appendChild(av); row.appendChild(bub); msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }

async function callGroq(text) {
  history.push({ role:'user', content:text });
  showTyping();
  document.getElementById('inp').disabled = true;
  try {
    const res  = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
      body: JSON.stringify({ model:'llama-3.1-8b-instant', messages:[{role:'system',content:SYSTEM},...history], max_tokens:300, temperature:0.6 })
    });
    const data = await res.json();
    removeTyping();
    if (data.error) { addMsg('bot','⚠️ '+data.error.message); history.pop(); }
    else {
      const reply = data.choices[0].message.content.trim();
      history.push({ role:'assistant', content:reply });
      addMsg('bot', reply);
    }
  } catch(e) {
    removeTyping();
    addMsg('bot','Connection error. Please try again.');
    history.pop();
  }
  document.getElementById('inp').disabled = false;
  document.getElementById('inp').focus();
}

function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text || !apiKey) return;
  inp.value = '';
  addMsg('user', text);
  callGroq(text);
}

function quick(btn) {
  if (!apiKey) return;
  addMsg('user', btn.textContent);
  callGroq(btn.textContent);
}
</script>
</body>
</html>
